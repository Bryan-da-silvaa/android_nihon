// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  ext {
    kotlinVersion = "2.2.20"
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.2.20")
    classpath("org.jetbrains.kotlin:compose-compiler-gradle-plugin:2.2.20")
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }

  configurations.all {
    resolutionStrategy {
      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.2.20"
      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.2.20"
      force "org.jetbrains.kotlin:kotlin-stdlib:2.2.20"
      force "org.jetbrains.kotlin:kotlin-reflect:2.2.20"
    }
  }
}

subprojects {
  afterEvaluate { project ->
    if (project.plugins.hasPlugin("org.jetbrains.kotlin.android")) {
      project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
          jvmTarget = "17"
          apiVersion = "2.2"
          languageVersion = "2.2"
        }
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
